shamefullyHoist: false
strictPeerDependencies: false
autoInstallPeers: true
enablePrePostScripts: true

minimumReleaseAge: 0

overrides:
  minimatch: '>=10.2.1'
  # 4.28.3 shipped a broken node.js (unterminated regex, fails `node --check`); 4.28.4 is the upstream fix.
  browserslist: '4.28.4'

allowBuilds:
  '@firebase/util': true
  '@swc/core': true
  esbuild: true
  msw: true
  protobufjs: true
  unrs-resolver: true
